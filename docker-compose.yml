services:
  meshcentral:
    image: ghcr.io/ylianst/meshcentral:${MESHCENTRAL_IMAGE_TAG:-latest-slim}
    container_name: meshcentral
    ports:
      - "127.0.0.1:4430:443"
    volumes:
      - meshcentral-data:/opt/meshcentral/meshcentral-data
      - meshcentral-files:/opt/meshcentral/meshcentral-files
      - meshcentral-backups:/opt/meshcentral/meshcentral-backups
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:443/ || wget -qO- http://localhost:443/ > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  meshcentral-data:
  meshcentral-files:
  meshcentral-backups:
