services:
  rustdesk:
    image: rustdesk/rustdesk-server-s6:${RUSTDESK_IMAGE_TAG:-1.1.15}
    container_name: rustdesk
    network_mode: host
    environment:
      RELAY: "${RELAY_HOST}"
      ENCRYPTED_ONLY: "1"
      RUST_LOG: "${RUST_LOG:-info}"
    volumes:
      - ./data:/data
    secrets:
      - key_pub
      - key_priv
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "s6-svstat", "/run/service/hbbs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

secrets:
  key_pub:
    file: ./secrets/key_pub
  key_priv:
    file: ./secrets/key_priv
